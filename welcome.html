<html>
    <head>
        <title>RoboForge</title>
        <style>
            nav {
                display: flex;
                align-items: center;
                padding: 10px 20px;
                background-color: #f8f9fa;
                border-bottom: 1px solid #ddd;
                justify-content: space-between; /* This pushes groups apart */
            }
            
            .left-section {
                display: flex;
                align-items: center;
                gap: 30px; /* Space between logo and left links */
            }
            
            .left-links, .right-links {
                display: flex;
                gap: 20px;
                align-items: center;
            }
            
            a {
                text-decoration: none;
                color: #333;
                font-family: Arial, sans-serif;
            }
            
            a:hover {
                color: #007bff;
            }

            #page-block 
            {
                width: 90%;
                height: 300px;
                position: absolute;
                left: 0px;          
                top: 50%;    
                align-items: center;        
                transform: translateY(-50%); 
                text-align: left;    
                padding: 40px;       
                display: flex;
            }
        
        </style>
    </head>
    <body>
        <nav>
            <div class="left-section">
                <img src="logo.png" height="100px" width="200px">
                <div class="left-links">
                    <a href="#">Home</a>
                    <a href="#">Explore</a>
                    <a href="#">About</a>
                </div>
            </div>
            
            <div class="right-links">
                <a href="login.html">Login</a>
                <a href="signup.html">Register</a>
            </div>
        </nav>
        <div id="page-block">
            <h1>Where robotics enthusiasts come together to design, share, and innovate.</h1><br>
            
        </div>
    </body>
</html>
